<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="furGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A44;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6D24;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Soft Circle -->
  <circle cx="256" cy="256" r="230" fill="#FFF8F0" />

  <!-- Fluffy Tail (Big and Detailed) -->
  <path d="M340 320c40-20 100 0 100 70 0 60-50 90-100 90s-80-30-80-60 30-80 80-100z" fill="url(#furGrad)" filter="url(#softShadow)"/>
  <path d="M440 390c0 40-20 60-50 70 20-10 30-30 30-50s-10-40-30-50c30 10 50 30 50 30z" fill="#FFFFFF" opacity="0.9"/>

  <!-- Body (Small and Cute) -->
  <path d="M256 320c-50 0-90 40-90 90 0 40 30 70 90 70s90-30 90-70c0-50-40-90-90-90z" fill="url(#furGrad)" />
  <path d="M256 330c-30 0-50 20-50 50s20 50 50 50 50-20 50-50-20-50-50-50z" fill="#FFFFFF" opacity="0.8"/>

  <!-- Large Round Head -->
  <path d="M256 100c-90 0-150 70-150 140 0 60 40 110 90 130-10 15-10 35 0 35 20 0 40-20 50-35h20c10 15 30 35 50 35 10 0 10-20 0-35 50-20 90-70 90-130 0-70-60-140-150-140z" fill="url(#furGrad)" filter="url(#softShadow)"/>

  <!-- Ears with Fur Tufts -->
  <path d="M150 120l-50-80c-5-10 10-15 18-5l60 65" fill="#FF6D24" stroke="#D35400" stroke-width="4"/>
  <path d="M362 120l50-80c5-10-10-15-18-5l-60 65" fill="#FF6D24" stroke="#D35400" stroke-width="4"/>
  <path d="M145 110l-20-30c-2-4 4-6 7-2l25 25" fill="#FFD1DC"/>
  <path d="M367 110l20-30c2-4-4-6-7-2l-25 25" fill="#FFD1DC"/>

  <!-- Cheeks / Muzzle (White and Fluffy) -->
  <path d="M106 240c0 40 40 70 80 70 20 0 50-10 70-30 20 20 50 30 70 30 40 0 80-30 80-70 0-30-30-50-70-50s-70 20-80 40c-10-20-40-40-80-40s-70 20-70 50z" fill="#FFFFFF"/>

  <!-- Eyes (Complex Shiny Chibi) -->
  <g>
    <circle cx="180" cy="240" r="38" fill="#2C3E50"/>
    <circle cx="170" cy="225" r="14" fill="#FFFFFF"/> <!-- Main Sparkle -->
    <circle cx="190" cy="255" r="7" fill="#FFFFFF" opacity="0.6"/> <!-- Soft Sparkle -->
    <path d="M150 220c-5-5-15 0-10 10" fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/> <!-- Eyelash -->
  </g>
  <g>
    <circle cx="332" cy="240" r="38" fill="#2C3E50"/>
    <circle cx="322" cy="225" r="14" fill="#FFFFFF"/> <!-- Main Sparkle -->
    <circle cx="342" cy="255" r="7" fill="#FFFFFF" opacity="0.6"/> <!-- Soft Sparkle -->
    <path d="M362 220c5-5 15 0 10 10" fill="none" stroke="#2C3E50" stroke-width="3" stroke-linecap="round"/> <!-- Eyelash -->
  </g>

  <!-- Blush -->
  <ellipse cx="130" cy="285" rx="30" ry="18" fill="#FF9999" opacity="0.4"/>
  <ellipse cx="382" cy="285" rx="30" ry="18" fill="#FF9999" opacity="0.4"/>

  <!-- Tiny Heart Nose -->
  <path d="M256 265c-2-3-8-3-10 0s5 10 10 12c5-2 12-9 10-12s-8-3-10 0z" fill="#1a1a1b"/>
  
  <!-- W-shaped Mouth -->
  <path d="M236 285c5 5 10 5 15 0 5 5 10 5 15 0" fill="none" stroke="#1a1a1b" stroke-width="3" stroke-linecap="round"/>

  <!-- Paws (Tiny White Mittens) -->
  <circle cx="210" cy="460" r="20" fill="#FFFFFF" filter="url(#softShadow)"/>
  <circle cx="302" cy="460" r="20" fill="#FFFFFF" filter="url(#softShadow)"/>
</svg>
