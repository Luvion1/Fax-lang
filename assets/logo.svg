<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="furPattern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    <filter id="fluffy" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" />
      <feOffset dx="0" dy="5" result="offsetblur" />
      <feComponentTransfer><feFuncA type="linear" slope="0.2"/></feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Huge Fluffy Tail (Detailed) -->
  <path d="M320 350c60-30 140 20 140 90 0 60-60 100-120 100s-100-40-100-80c0-40 40-90 80-110z" fill="url(#furPattern)" filter="url(#fluffy)"/>
  <path d="M460 440c0 40-30 60-70 72 30-15 50-40 50-60s-20-40-50-50c40 10 70 38 70 38z" fill="#FFFFFF" opacity="0.8"/>

  <!-- Small Chibi Body -->
  <circle cx="256" cy="400" r="70" fill="url(#furPattern)" />
  <path d="M256 400c-30 0-50-20-50-40s20-30 50-30 50 10 50 30-20 40-50 40z" fill="#FFFFFF" opacity="0.6"/>

  <!-- Large Round Head -->
  <path d="M256 80c-100 0-170 80-170 160 0 70 50 130 110 150-5 10-15 30-30 40 25 0 55-15 70-35h40c15 20 45 35 70 35-15-10-25-30-30-40 60-20 110-80 110-150 0-80-70-160-170-160z" fill="url(#furPattern)" filter="url(#fluffy)"/>

  <!-- Detailed Chibi Ears -->
  <path d="M140 110l-60-80c-5-8 10-12 15-5l55 70" fill="#E67E22" stroke="#A04000" stroke-width="3"/>
  <path d="M372 110l60-80c5-8-10-12-15-5l-55 70" fill="#E67E22" stroke="#A04000" stroke-width="3"/>
  <path d="M145 100l-25-35c-2-3 4-5 6-2l25 30" fill="#FFD1DC"/>
  <path d="M367 100l25-35c2-3-4-5-6-2l-25 30" fill="#FFD1DC"/>

  <!-- Fluffy Muzzle -->
  <path d="M180 280c0 40 40 60 76 60s76-20 76-60c0-25-30-45-76-45s-76 20-76 45z" fill="#FFFFFF" opacity="0.95"/>

  <!-- Sparkling Anime Eyes (Detailed Chibi) -->
  <g>
    <circle cx="175" cy="245" r="38" fill="#2C3E50"/>
    <circle cx="165" cy="230" r="14" fill="#FFFFFF"/> 
    <circle cx="185" cy="265" r="6" fill="#FFFFFF" opacity="0.5"/>
    <path d="M145 220c0-10 30-10 30 0" fill="none" stroke="#2C3E50" stroke-width="4" stroke-linecap="round"/>
  </g>
  <g>
    <circle cx="337" cy="245" r="38" fill="#2C3E50"/>
    <circle cx="327" cy="230" r="14" fill="#FFFFFF"/> 
    <circle cx="347" cy="265" r="6" fill="#FFFFFF" opacity="0.5"/>
    <path d="M307 220c0-10 30-10 30 0" fill="none" stroke="#2C3E50" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Blush and Nose -->
  <circle cx="130" cy="290" r="20" fill="#FFB6C1" opacity="0.5"/>
  <circle cx="382" cy="290" r="20" fill="#FFB6C1" opacity="0.5"/>
  <path d="M256 280l-8 10h16z" fill="#1a1a1b"/>
  
  <!-- Smiling Mouth -->
  <path d="M236 305c5 8 15 8 20 0 5 8 15 8 20 0" fill="none" stroke="#1a1a1b" stroke-width="3" stroke-linecap="round"/>
</svg>
