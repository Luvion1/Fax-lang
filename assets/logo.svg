<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Geometric Minimalist Fox -->
  <defs>
    <linearGradient id="minGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Body/Head Shape: Abstract Triangle with Rounded Edges -->
  <path d="M256 100 L400 350 Q410 370 390 370 L122 370 Q102 370 112 350 Z" fill="url(#minGrad)" />
  
  <!-- Ears: Sharp Geometric Cutouts -->
  <path d="M256 100 L180 180 L256 180 Z" fill="#D35400" opacity="0.6" />
  <path d="M256 100 L332 180 L256 180 Z" fill="#D35400" opacity="0.3" />
  
  <!-- Face/Snout: White Minimalist Inlay -->
  <path d="M256 220 L320 330 Q325 340 315 340 L197 340 Q187 340 192 330 Z" fill="#FFFFFF" opacity="0.9" />
  
  <!-- Nose: Single Point of Focus -->
  <circle cx="256" cy="315" r="8" fill="#1a1a1b" />
  
  <!-- Abstract Tail Accent -->
  <path d="M400 370 Q450 370 430 300 Q410 250 350 220" fill="none" stroke="url(#minGrad)" stroke-width="20" stroke-linecap="round" opacity="0.4" />
</svg>