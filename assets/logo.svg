<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradients for realistic fur depth -->
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E67E22;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D35400;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A04000;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="eyeGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#F1C40F;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#D4AC0D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    <filter id="furTexture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" />
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="256" cy="256" r="240" fill="#ffffff" opacity="0.05" />

  <!-- Main Face Shape (Realistic Contours) -->
  <path d="M256 60c-15 0-40 20-70 50-30 30-50 80-50 130 0 60 40 120 120 160 80-40 120-100 120-160 0-50-20-100-50-130-30-30-55-50-70-50z" fill="url(#bodyGrad)" />

  <!-- Ears with Internal Detail -->
  <path d="M140 150l-60-90c-5-8 5-15 15-10l90 60c-20 15-35 25-45 40z" fill="#873600" />
  <path d="M372 150l60-90c5-8-5-15-15-10l-90 60c20 15 35 25 45 40z" fill="#873600" />
  <path d="M145 145l-40-60c2 10 10 20 20 30" fill="#FAD7A0" opacity="0.4" />
  
  <!-- Muzzle/Cheeks with Multi-layered White Fur -->
  <path d="M140 240c0 50 40 100 116 130 76-30 116-80 116-130-10-20-40-40-70-40-20 20-30 30-46 30s-26-10-46-30c-30 0-60 20-70 40z" fill="#ffffff" opacity="0.9" />
  <path d="M256 370c-40 0-80-30-100-60 20 20 60 40 100 40s80-20 100-40c-20 30-60 60-100 60z" fill="#EAECEE" />

  <!-- Intense Realistic Eyes -->
  <g>
    <!-- Left Eye -->
    <ellipse cx="190" cy="225" rx="22" ry="18" fill="#1a1a1b" />
    <ellipse cx="190" cy="225" rx="18" ry="14" fill="url(#eyeGrad)" />
    <path d="M190 215c-10 0-10 20 0 20s10-20 0-20z" fill="#000000" /> <!-- Pupil -->
    <circle cx="185" cy="220" r="4" fill="#ffffff" opacity="0.8" /> <!-- Reflection -->
  </g>
  <g>
    <!-- Right Eye -->
    <ellipse cx="322" cy="225" rx="22" ry="18" fill="#1a1a1b" />
    <ellipse cx="322" cy="225" rx="18" ry="14" fill="url(#eyeGrad)" />
    <path d="M322 215c-10 0-10 20 0 20s10-20 0-20z" fill="#000000" /> <!-- Pupil -->
    <circle cx="317" cy="220" r="4" fill="#ffffff" opacity="0.8" /> <!-- Reflection -->
  </g>

  <!-- Realistic Nose & Whiskers -->
  <path d="M240 310h32l-16 12z" fill="#17202A" />
  <g stroke="#17202A" stroke-width="0.5" opacity="0.3">
    <line x1="180" y1="320" x2="100" y2="300" />
    <line x1="180" y1="330" x2="100" y2="340" />
    <line x1="332" y1="320" x2="412" y2="300" />
    <line x1="332" y1="330" x2="412" y2="340" />
  </g>

  <!-- Fur Highlights (Detailed strokes) -->
  <path d="M256 80c-20 5-40 20-50 40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
  <path d="M150 280c-10 10-20 30-20 50" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.2" />
</svg>