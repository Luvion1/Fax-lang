name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm clang lld
          
      - name: Install Dependencies
        run: npm install
        
      - name: Lint
        run: npm run lint
        
      - name: Run Tests
        run: npm test
